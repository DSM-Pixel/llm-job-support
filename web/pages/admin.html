<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNSoft — 회사 관리</title>
  <link rel="icon" type="image/png" href="../assets/img/logomark-dark.png" />
  <script>try{var t=(JSON.parse(localStorage.getItem("gnsoft.settings")||"{}")||{}).theme;document.documentElement.setAttribute("data-theme",t==="dark"?"dark":"light");}catch(e){}</script>
  <script>try{var _a=localStorage.getItem("gnsoft.auth");if(!_a||_a==="null"){location.replace("login.html");}}catch(e){}</script>
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/projects.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <div class="pj-landing">
    <header class="pj-top">
      <span class="pj-logo"><img class="logo-img" src="../assets/img/logomark-transparent.png" alt="" />GNSoft AI 플랫폼</span>
      <div class="pj-top-right">
        <a class="ad-back-link" href="projects.html">← 프로젝트 목록</a>
        <div class="user-box">
          <span class="avatar" title="내 프로필" role="button" tabindex="0">도현</span>
        </div>
      </div>
    </header>

    <main class="pj-main">
      <section class="ad-wrap" data-role="wrap" hidden>
        <div class="ad-head">
          <div>
            <h2>회사 멤버 관리</h2>
            <p class="ad-sub">같은 회사(<b data-role="company">—</b>) 멤버의 활동·기록·상태를 관리합니다.</p>
          </div>
          <div class="ad-summary" data-role="summary"></div>
        </div>

        <div class="ad-table-wrap">
          <table class="ad-table">
            <thead>
              <tr>
                <th>멤버</th>
                <th>소속</th>
                <th class="ad-num">오늘</th>
                <th class="ad-num">최근 7일</th>
                <th class="ad-num">총 활동</th>
                <th class="ad-num">작업물</th>
                <th class="ad-num">프로젝트</th>
                <th>최근 활동</th>
                <th>상태</th>
                <th></th>
              </tr>
            </thead>
            <tbody data-role="rows"></tbody>
          </table>
        </div>
        <p class="ad-empty" data-role="empty" hidden>표시할 멤버가 없습니다.</p>
      </section>

      <section class="ad-denied" data-role="denied" hidden>
        <h2>접근 권한이 없습니다</h2>
        <p>이 페이지는 관리자만 열 수 있습니다.</p>
        <a class="btn primary" href="projects.html">프로젝트 목록으로</a>
      </section>
    </main>
  </div>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
